<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DASHBOARD OFFICINA - Fuori Servizio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Palette Dark Mode */
            --bg-base: #09090b;
            --card-bg: #18181b;
            --border-color: #27272a;
            --orange: #f59e0b;
            --red: #ef4444;
            --green: #10b981;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --text-dark: #09090b;
            
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* --- HEADER --- */
        .header {
            height: 72px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(9, 9, 11, 0.8);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .header h1 { 
            font-weight: 800; 
            font-size: clamp(1.2rem, 1.8vw, 1.5rem); 
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1::before {
            content: '\f0ad';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: var(--orange);
            font-size: 1.1rem;
        }
        
        #clock { 
            font-family: 'JetBrains Mono', monospace; 
            font-weight: 700;
            font-size: clamp(1.4rem, 2.5vw, 1.8rem); 
        }

        /* --- SPLIT LAYOUT --- */
        .dashboard-split {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
            min-height: 0;
            overflow: hidden;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 30px;
            position: relative;
        }

        .col-manutenzione { border-top: 5px solid var(--orange); }
        .col-fuori-servizio { border-top: 5px solid var(--red); }

        .col-header-group {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .col-header {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .col-manutenzione .col-header { color: var(--orange); }
        .col-fuori-servizio .col-header { color: var(--red); }

        .col-subheader {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .vehicle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            overflow-y: auto;
            padding-right: 10px;
            align-content: start;
        }

        .vehicle-grid::-webkit-scrollbar { width: 6px; }
        .vehicle-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* --- CARDS DEI MEZZI --- */
        .v-card {
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            position: relative;
            overflow: hidden;
            min-height: 130px;
        }

        .v-card.status-man { border-left: 4px solid var(--orange); }
        .v-card.status-off { border-left: 4px solid var(--red); background: rgba(239, 68, 68, 0.05); }

        /* ========================================= */
        /* LA NUOVA AMBULANZA 2D (Profilo Laterale) */
        /* ========================================= */

        .anim-box {
            position: relative;
            width: 140px;
            height: 90px;
            background: rgba(255,255,255,0.02);
            border-radius: var(--radius-sm);
            flex-shrink: 0;
            border-bottom: 2px solid var(--border-color); /* Pavimento garage */
        }

        .css-amb {
            position: absolute; 
            bottom: 8px; /* Poggia perfettamente a terra grazie alle ruote */
            left: 10px;
            width: 100px; 
            height: 55px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            transition: all 0.3s;
        }

        /* Modulo Sanitario (Parte posteriore quadrata) */
        .amb-box {
            position: absolute; bottom: 0; left: 0;
            width: 65px; height: 55px; 
            background: #f8fafc;
            border-radius: 4px 0 0 4px;
        }
        
        /* Cabina Guida (Parte anteriore inclinata) */
        .amb-cabin {
            position: absolute; bottom: 0; left: 65px;
            width: 35px; height: 45px; 
            background: #f8fafc;
            border-radius: 0 10px 0 0;
        }

        /* Croce Rossa */
        .amb-cross {
            position: absolute; top: 12px; left: 24px; width: 16px; height: 16px;
        }
        .amb-cross::before { content:''; position:absolute; top:0; left:5px; width:6px; height:16px; background:var(--red); border-radius: 1px;}
        .amb-cross::after { content:''; position:absolute; top:5px; left:0; width:16px; height:6px; background:var(--red); border-radius: 1px;}

        /* Striscia Rossa laterale */
        .amb-stripe {
            position: absolute; bottom: 12px; left: 0; width: 100px; height: 4px; background: var(--red); z-index: 5;
        }

        /* Parabrezza / Finestrino */
        .amb-window {
            position: absolute; top: 4px; right: 4px;
            width: 16px; height: 18px;
            background: #0f172a;
            border-radius: 0 8px 0 0;
            border-left: 2px solid #cbd5e1;
        }

        /* Vano Motore (Oscurato) */
        .amb-engine {
            position: absolute; bottom: 0; right: 0;
            width: 16px; height: 20px;
            background: #1e293b;
            border-radius: 0 4px 0 0;
        }

        /* IL COFANO CHE SI APRE */
        .amb-hood {
            position: absolute; bottom: 18px; right: -2px;
            width: 20px; height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            transform-origin: 0% 50%; /* Cardine vicino al parabrezza */
            z-index: 6;
            transition: transform 0.4s ease-out;
        }

        /* Selezionando questo apre il cofano */
        .is-broken .amb-hood {
            transform: rotate(-60deg);
        }

        /* Ruote */
        .amb-wheel {
            position: absolute; bottom: -8px; width: 20px; height: 20px;
            background: #1e293b; border: 4px solid #cbd5e1; border-radius: 50%; z-index: 3;
        }
        .w-back { left: 10px; }
        .w-front { left: 70px; }

        /* Scintille nel motore */
        .spark { position: absolute; width: 4px; height: 4px; background: #fbbf24; border-radius: 50%; }
        .s1 { top: 4px; left: 4px; animation: spark-anim 0.6s infinite; }
        .s2 { top: 8px; left: 8px; animation: spark-anim 0.8s infinite 0.2s; }
        
        @keyframes spark-anim {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(-8px,-12px) scale(0); }
        }

        /* ========================================= */
        /* IL MECCANICO AL LAVORO */
        /* ========================================= */
        .mechanic {
            position: absolute;
            bottom: 0px; right: 10px; /* In piedi davanti all'ambulanza */
            display: flex; flex-direction: column; align-items: center;
            z-index: 5;
        }
        .mec-head { width: 14px; height: 14px; background: #fca5a5; border-radius: 50%; z-index: 2;}
        .mec-body { width: 16px; height: 22px; background: var(--orange); border-radius: 6px 6px 0 0; margin-top: -2px; z-index: 1;}
        
        /* Braccio che entra nel motore */
        .mec-arm {
            position: absolute; top: 12px; left: -8px;
            width: 14px; height: 6px; background: var(--orange);
            border-radius: 3px;
            transform-origin: 100% 50%; /* La spalla è a destra */
            animation: repair 0.4s infinite alternate ease-in-out;
            z-index: 3;
        }
        
        /* Chiave inglese in mano */
        .mec-arm::after {
            content: '\f0ad'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; left: -10px; top: -5px; color: #a1a1aa; font-size: 14px;
            transform: rotate(-45deg);
        }

        @keyframes repair {
            0% { transform: rotate(10deg); }
            100% { transform: rotate(-25deg); }
        }

        /* ========================================= */
        /* FUORI SERVIZIO (Ambulanza ferma + Semaforo)*/
        /* ========================================= */
        
        /* Oscuramento veicolo fermo */
        .dark-amb { filter: grayscale(0.6) brightness(0.5); }
        .dark-amb .amb-hood { transform: rotate(0deg); } /* Cofano rigorosamente chiuso */

        .semaforo-wrap {
            position: absolute; bottom: 0; right: 15px;
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }
        .semaforo-box {
            width: 18px; height: 42px; background: #09090b; border: 2px solid #27272a; border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
        }
        .semaforo-palo { width: 4px; height: 15px; background: #27272a; }
        
        .semaforo-luce { width: 10px; height: 10px; border-radius: 50%; background: #18181b; }
        .semaforo-luce.red { animation: flash-red-2d 1s infinite; }
        
        @keyframes flash-red-2d {
            0%, 49% { background: var(--red); box-shadow: 0 0 10px var(--red); }
            50%, 100% { background: #18181b; box-shadow: none; }
        }

        /* --- TESTI INFO --- */
        .v-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .v-sigla { font-size: 1.6rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .v-modello { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;}
        .v-targa { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.9rem; font-weight: 700; color: var(--text-dark); 
            background: var(--text-main); padding: 4px 10px; border-radius: var(--radius-sm); 
            width: fit-content; margin-top: 6px;
        }

        .empty-state { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted); font-size: 1.2rem; font-style: italic; }

        /* --- AUTO LIGHT MODE --- */
        body.light-mode { --bg-base: #f4f4f5; --card-bg: #ffffff; --border-color: #e4e4e7; --text-main: #09090b; --text-muted: #71717a; --text-dark: #fafafa; }
        body.light-mode .header { background: rgba(255, 255, 255, 0.95); }
        body.light-mode .v-card.status-off { background: rgba(239, 68, 68, 0.05); }
        body.light-mode .anim-box { background: rgba(0,0,0,0.02); border-color: #d4d4d8; }
        body.light-mode .semaforo-palo { background: #52525b; }
        body.light-mode .semaforo-box { background: #3f3f46; border-color: #27272a; }
        body.light-mode .semaforo-luce { background: #71717a; }
        @keyframes flash-red-2d-light { 0%, 49% { background: var(--red); box-shadow: 0 0 10px var(--red); } 50%, 100% { background: #71717a; box-shadow: none; } }
        body.light-mode .semaforo-luce.red { animation: flash-red-2d-light 1s infinite; }

    </style>
</head>
<body>

    <div class="header">
        <h1>SITUAZIONE OFFICINA</h1>
        <div id="clock">00:00</div>
    </div>

    <div class="dashboard-split">
        <!-- Colonna Manutenzione -->
        <div class="column col-manutenzione">
            <div class="col-header-group">
                <div class="col-header">In Manutenzione</div>
                <div class="col-subheader">Mezzo presso officina meccanica autorizzata, allestitore o elettrauto</div>
            </div>
            <div class="vehicle-grid" id="grid-manutenzione"></div>
        </div>

        <!-- Colonna Fuori Servizio -->
        <div class="column col-fuori-servizio">
            <div class="col-header-group">
                <div class="col-header">Fuori Servizio</div>
                <div class="col-subheader">Mezzo presente in autoparco o distaccamento, non utilizzabile</div>
            </div>
            <div class="vehicle-grid" id="grid-fuori-servizio"></div>
        </div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMtO9pbvrr-yz1xMwquFeonWlhrwz6R_01HXu0swxX6tqrNok0Xjr6KRfIdYRnnGx8ZvjIoN_9vMQi/pub?gid=0&single=true&output=csv';

        async function update() {
            try {
                const currentHour = new Date().getHours();
                if (currentHour >= 8 && currentHour < 18) document.body.classList.add('light-mode');
                else document.body.classList.remove('light-mode');

                document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

                const res = await fetch(sheetUrl + '&t=' + Date.now());
                const csv = await res.text();
                const sep = csv.includes(';') ? ';' : ',';
                const lines = csv.split(/\r?\n/).filter(l => l.trim() !== "");
                const data = lines.slice(1).map(l => l.split(sep).map(p => p.replace(/^"|"$/g, '').trim()));
                
                const gridMan = document.getElementById('grid-manutenzione');
                const gridOff = document.getElementById('grid-fuori-servizio');
                
                gridMan.innerHTML = '';
                gridOff.innerHTML = '';

                let countMan = 0; let countOff = 0;

                data.forEach(d => {
                    const sigla = d[1];
                    const modello = d[2] || '---';
                    const targa = d[3] || '---';
                    const status = (d[4] || "").toUpperCase();

                    if (!sigla) return;

                    // HTML MANUTENZIONE: Ambulanza laterale + Cofano Aperto + Meccanico
                    if (status.includes("MANUTENZIONE")) {
                        countMan++;
                        gridMan.innerHTML += `
                            <div class="v-card status-man">
                                <div class="anim-box">
                                    
                                    <div class="css-amb is-broken">
                                        <div class="amb-box"><div class="amb-cross"></div></div>
                                        <div class="amb-cabin">
                                            <div class="amb-window"></div>
                                            <div class="amb-engine">
                                                <div class="spark s1"></div>
                                                <div class="spark s2"></div>
                                            </div>
                                            <div class="amb-hood"></div>
                                        </div>
                                        <div class="amb-stripe"></div>
                                        <div class="amb-wheel w-back"></div>
                                        <div class="amb-wheel w-front"></div>
                                    </div>
                                    
                                    <div class="mechanic">
                                        <div class="mec-head"></div>
                                        <div class="mec-arm"></div>
                                        <div class="mec-body"></div>
                                    </div>

                                </div>
                                <div class="v-info">
                                    <div class="v-sigla">${sigla}</div>
                                    <div class="v-modello">${modello}</div>
                                    <div class="v-targa">${targa}</div>
                                </div>
                            </div>
                        `;
                    }
                    
                    // HTML FUORI SERVIZIO: Ambulanza ferma/spenta + Semaforo a palo
                    if (status.includes("FUORI SERVIZIO")) {
                        countOff++;
                        gridOff.innerHTML += `
                            <div class="v-card status-off">
                                <div class="anim-box">
                                    
                                    <div class="css-amb dark-amb">
                                        <div class="amb-box"><div class="amb-cross"></div></div>
                                        <div class="amb-cabin">
                                            <div class="amb-window"></div>
                                            <div class="amb-engine"></div>
                                            <div class="amb-hood"></div>
                                        </div>
                                        <div class="amb-stripe"></div>
                                        <div class="amb-wheel w-back"></div>
                                        <div class="amb-wheel w-front"></div>
                                    </div>
                                    
                                    <div class="semaforo-wrap">
                                        <div class="semaforo-box">
                                            <div class="semaforo-luce red"></div>
                                            <div class="semaforo-luce"></div>
                                        </div>
                                        <div class="semaforo-palo"></div>
                                    </div>

                                </div>
                                <div class="v-info">
                                    <div class="v-sigla">${sigla}</div>
                                    <div class="v-modello">${modello}</div>
                                    <div class="v-targa">${targa}</div>
                                </div>
                            </div>
                        `;
                    }
                });

                if (countMan === 0) gridMan.innerHTML = '<div class="empty-state"><i class="fa-solid fa-check-circle" style="font-size: 2rem; color: var(--green); margin-bottom: 10px; display:block;"></i>Nessun mezzo in officina esterna</div>';
                if (countOff === 0) gridOff.innerHTML = '<div class="empty-state"><i class="fa-solid fa-check-circle" style="font-size: 2rem; color: var(--green); margin-bottom: 10px; display:block;"></i>Tutti i mezzi in sede sono operativi</div>';

            } catch (e) { console.error("Errore:", e); }
        }

        update(); setInterval(update, 30000); 
    </script>
</body>
</html>
