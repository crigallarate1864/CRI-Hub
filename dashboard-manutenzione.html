<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DASHBOARD OFFICINA - Fuori Servizio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome per le icone animate -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Palette Dark Mode */
            --bg-base: #09090b;
            --card-bg: #18181b;
            --border-color: #27272a;
            --orange: #f59e0b;
            --red: #ef4444;
            --green: #10b981;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --text-dark: #09090b;
            
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* --- HEADER --- */
        .header {
            height: 72px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(9, 9, 11, 0.8);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .header h1 { 
            font-weight: 800; 
            font-size: clamp(1.2rem, 1.8vw, 1.5rem); 
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1::before {
            content: '\f0ad';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: var(--orange);
            font-size: 1.1rem;
        }
        
        #clock { 
            font-family: 'JetBrains Mono', monospace; 
            font-weight: 700;
            font-size: clamp(1.4rem, 2.5vw, 1.8rem); 
        }

        /* --- SPLIT LAYOUT --- */
        .dashboard-split {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
            min-height: 0;
            overflow: hidden;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 30px;
            position: relative;
        }

        .col-manutenzione { border-top: 5px solid var(--orange); }
        .col-fuori-servizio { border-top: 5px solid var(--red); }

        /* Gruppo Titolo + Sottotitolo */
        .col-header-group {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .col-header {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .col-manutenzione .col-header { color: var(--orange); }
        .col-fuori-servizio .col-header { color: var(--red); }

        .col-subheader {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .vehicle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            overflow-y: auto;
            padding-right: 10px;
            align-content: start;
        }

        .vehicle-grid::-webkit-scrollbar { width: 6px; }
        .vehicle-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* --- CARDS DEI MEZZI --- */
        .v-card {
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            position: relative;
            overflow: hidden;
            min-height: 130px;
        }

        .v-card.status-man { border-left: 4px solid var(--orange); }
        .v-card.status-off { 
            border-left: 4px solid var(--red); 
            background: rgba(239, 68, 68, 0.05); 
        }

        /* --- CONTENITORE ANIMAZIONI --- */
        .anim-box {
            position: relative;
            width: 120px;
            height: 90px;
            display: flex;
            background: rgba(255,255,255,0.02);
            border-radius: var(--radius-sm);
            flex-shrink: 0;
            border-bottom: 2px solid var(--border-color); /* Pavimento */
        }

        /* ========================================= */
        /* 1. ANIMAZIONE PONTE SOLLEVATORE & MECCANICO */
        /* ========================================= */

        .ponte-colonna {
            position: absolute;
            bottom: 0;
            width: 10px;
            height: 70px;
            background: #475569;
            border-radius: 2px 2px 0 0;
        }
        .ponte-colonna.sx { left: 20px; }
        .ponte-colonna.dx { right: 20px; }

        .ponte-piattaforma {
            position: absolute;
            bottom: 50px;
            left: 10px;
            width: 100px;
            height: 6px;
            background: var(--orange);
            border-radius: 3px;
        }

        .ambulanza-man {
            position: absolute;
            bottom: 56px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.8rem;
            color: var(--text-main);
            z-index: 5;
        }

        .omino-sotto {
            position: absolute;
            bottom: 0px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 4;
            animation: scivola-carrello 4s infinite alternate ease-in-out;
        }

        .carrellino {
            position: absolute;
            bottom: 0;
            width: 34px;
            height: 4px;
            background: #ef4444;
            border-radius: 2px;
        }
        .carrellino::before, .carrellino::after {
            content: ''; position: absolute; bottom: -2px; width: 6px; height: 6px; background: #000; border-radius: 50%;
        }
        .carrellino::before { left: 2px; }
        .carrellino::after { right: 2px; }

        .omino-corpo {
            font-size: 1.6rem;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .omino-braccio {
            position: absolute;
            top: -12px;
            right: -8px;
            font-size: 1.2rem;
            color: var(--text-main);
            transform-origin: bottom left;
            animation: avvita-bullone 1.5s infinite alternate ease-in-out;
        }

        @keyframes scivola-carrello {
            0% { transform: translateX(-80%); }
            100% { transform: translateX(10%); }
        }

        @keyframes avvita-bullone {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-35deg); }
        }

        /* ========================================= */
        /* 2. ANIMAZIONE SEMAFORO NETTO (Fuori Servizio)*/
        /* ========================================= */

        .ambulanza-off {
            position: absolute;
            bottom: 0;
            left: 10px;
            font-size: 3rem;
            color: var(--text-muted);
            opacity: 0.3;
            z-index: 1;
        }

        .semaforo-palo {
            position: absolute;
            right: 25px;
            bottom: 0;
            width: 6px;
            height: 60px;
            background: #27272a;
            z-index: 2;
        }

        .semaforo-corpo {
            position: absolute;
            right: 17px;
            bottom: 30px;
            width: 22px;
            height: 52px;
            background: #09090b;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            border: 2px solid #27272a;
            z-index: 3;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .luce {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #18181b;
        }

        .luce.red {
            animation: lampeggio-netto 1s infinite;
        }

        @keyframes lampeggio-netto {
            0%, 49% { background: var(--red); box-shadow: 0 0 8px var(--red), 0 0 16px var(--red); }
            50%, 100% { background: #18181b; box-shadow: none; }
        }

        /* Info Mezzo */
        .v-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .v-sigla { font-size: 1.6rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .v-modello { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;}
        .v-targa { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.9rem; 
            font-weight: 700;
            color: var(--text-dark); 
            background: var(--text-main); 
            padding: 4px 10px; 
            border-radius: var(--radius-sm); 
            width: fit-content; 
            margin-top: 6px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-style: italic;
        }

        /* --- AUTO LIGHT MODE --- */
        body.light-mode {
            --bg-base: #f4f4f5;
            --card-bg: #ffffff;
            --border-color: #e4e4e7;
            --text-main: #09090b;
            --text-muted: #71717a;
            --text-dark: #fafafa;
        }
        body.light-mode .header { background: rgba(255, 255, 255, 0.95); }
        body.light-mode .v-card.status-off { background: rgba(239, 68, 68, 0.05); }
        body.light-mode .anim-box { background: rgba(0,0,0,0.02); border-color: #d4d4d8; }
        
        body.light-mode .ponte-colonna { background: #94a3b8; }
        body.light-mode .semaforo-palo { background: #52525b; }
        body.light-mode .semaforo-corpo { background: #3f3f46; border-color: #27272a; }
        body.light-mode .luce { background: #71717a; }
        
        @keyframes lampeggio-netto-light {
            0%, 49% { background: var(--red); box-shadow: 0 0 8px var(--red), 0 0 16px var(--red); }
            50%, 100% { background: #71717a; box-shadow: none; }
        }
        body.light-mode .luce.red { animation: lampeggio-netto-light 1s infinite; }

    </style>
</head>
<body>

    <div class="header">
        <h1>SITUAZIONE OFFICINA</h1>
        <div id="clock">00:00</div>
    </div>

    <div class="dashboard-split">
        <!-- Colonna Manutenzione -->
        <div class="column col-manutenzione">
            <div class="col-header-group">
                <div class="col-header">In Manutenzione</div>
                <div class="col-subheader">Mezzo presso officina meccanica autorizzata, allestitore o elettrauto</div>
            </div>
            <div class="vehicle-grid" id="grid-manutenzione">
                <!-- Generato da JS -->
            </div>
        </div>

        <!-- Colonna Fuori Servizio -->
        <div class="column col-fuori-servizio">
            <div class="col-header-group">
                <div class="col-header">Fuori Servizio</div>
                <div class="col-subheader">Mezzo presente in autoparco o distaccamento, non utilizzabile</div>
            </div>
            <div class="vehicle-grid" id="grid-fuori-servizio">
                <!-- Generato da JS -->
            </div>
        </div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMtO9pbvrr-yz1xMwquFeonWlhrwz6R_01HXu0swxX6tqrNok0Xjr6KRfIdYRnnGx8ZvjIoN_9vMQi/pub?gid=0&single=true&output=csv';

        async function update() {
            try {
                // Tema chiaro/scuro in base all'orario
                const currentHour = new Date().getHours();
                if (currentHour >= 8 && currentHour < 18) {
                    document.body.classList.add('light-mode');
                } else {
                    document.body.classList.remove('light-mode');
                }

                // Orologio
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

                // Fetch Dati
                const res = await fetch(sheetUrl + '&t=' + Date.now());
                const csv = await res.text();
                const sep = csv.includes(';') ? ';' : ',';
                const lines = csv.split(/\r?\n/).filter(l => l.trim() !== "");
                const data = lines.slice(1).map(l => l.split(sep).map(p => p.replace(/^"|"$/g, '').trim()));
                
                const gridMan = document.getElementById('grid-manutenzione');
                const gridOff = document.getElementById('grid-fuori-servizio');
                
                gridMan.innerHTML = '';
                gridOff.innerHTML = '';

                let countMan = 0;
                let countOff = 0;

                data.forEach(d => {
                    const sigla = d[1];
                    const modello = d[2] || '---';
                    const targa = d[3] || '---';
                    const status = (d[4] || "").toUpperCase();

                    if (!sigla) return;

                    // Creazione HTML per MANUTENZIONE (Ponte Sollevatore)
                    if (status.includes("MANUTENZIONE")) {
                        countMan++;
                        gridMan.innerHTML += `
                            <div class="v-card status-man">
                                <div class="anim-box">
                                    <!-- Il Ponte Idraulico -->
                                    <div class="ponte-colonna sx"></div>
                                    <div class="ponte-colonna dx"></div>
                                    <div class="ponte-piattaforma"></div>
                                    
                                    <!-- L'ambulanza sollevata -->
                                    <i class="fa-solid fa-truck-medical ambulanza-man"></i>
                                    
                                    <!-- L'omino sul carrellino sotto il ponte -->
                                    <div class="omino-sotto">
                                        <div class="carrellino"></div>
                                        <i class="fa-solid fa-person omino-corpo"></i>
                                        <i class="fa-solid fa-wrench omino-braccio"></i>
                                    </div>
                                </div>
                                <div class="v-info">
                                    <div class="v-sigla">${sigla}</div>
                                    <div class="v-modello">${modello}</div>
                                    <div class="v-targa">${targa}</div>
                                </div>
                            </div>
                        `;
                    }
                    
                    // Creazione HTML per FUORI SERVIZIO (Semaforo)
                    if (status.includes("FUORI SERVIZIO")) {
                        countOff++;
                        gridOff.innerHTML += `
                            <div class="v-card status-off">
                                <div class="anim-box">
                                    <i class="fa-solid fa-truck-medical ambulanza-off"></i>
                                    <div class="semaforo-palo"></div>
                                    <div class="semaforo-corpo">
                                        <div class="luce red"></div>
                                        <div class="luce"></div>
                                        <div class="luce"></div>
                                    </div>
                                </div>
                                <div class="v-info">
                                    <div class="v-sigla">${sigla}</div>
                                    <div class="v-modello">${modello}</div>
                                    <div class="v-targa">${targa}</div>
                                </div>
                            </div>
                        `;
                    }
                });

                // Gestione stati vuoti
                if (countMan === 0) gridMan.innerHTML = '<div class="empty-state"><i class="fa-solid fa-check-circle" style="font-size: 2rem; color: var(--green); margin-bottom: 10px; display:block;"></i>Nessun mezzo in officina esterna</div>';
                if (countOff === 0) gridOff.innerHTML = '<div class="empty-state"><i class="fa-solid fa-check-circle" style="font-size: 2rem; color: var(--green); margin-bottom: 10px; display:block;"></i>Tutti i mezzi in sede sono operativi</div>';

            } catch (e) { 
                console.error("Errore aggiornamento dati:", e); 
            }
        }

        // Primo avvio e loop ogni 30 secondi
        update();
        setInterval(update, 30000); 
    </script>
</body>
</html>
