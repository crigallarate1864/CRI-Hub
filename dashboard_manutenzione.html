<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DASHBOARD OFFICINA - Fuori Servizio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome per le icone animate -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Palette Dark Mode (Ereditata dalla tua main) */
            --bg-base: #09090b;
            --card-bg: #18181b;
            --border-color: #27272a;
            --orange: #f59e0b;
            --red: #ef4444;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --text-dark: #09090b;
            
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* --- HEADER --- */
        .header {
            height: 72px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(9, 9, 11, 0.8);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .header h1 { 
            font-weight: 800; 
            font-size: clamp(1.2rem, 1.8vw, 1.5rem); 
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1::before {
            content: '\f0ad'; /* Wrench icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: var(--orange);
            font-size: 1.1rem;
        }
        
        #clock { 
            font-family: 'JetBrains Mono', monospace; 
            font-weight: 700;
            font-size: clamp(1.4rem, 2.5vw, 1.8rem); 
        }

        /* --- SPLIT LAYOUT --- */
        .dashboard-split {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
            min-height: 0;
            overflow: hidden;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 30px;
            position: relative;
        }

        .col-manutenzione { border-top: 5px solid var(--orange); }
        .col-fuori-servizio { border-top: 5px solid var(--red); }

        .col-header {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
        }
        
        .col-manutenzione .col-header { color: var(--orange); }
        .col-fuori-servizio .col-header { color: var(--red); }

        .vehicle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            overflow-y: auto;
            padding-right: 10px;
            align-content: start;
        }

        /* Scrollbar */
        .vehicle-grid::-webkit-scrollbar { width: 6px; }
        .vehicle-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* --- CARDS DEI MEZZI --- */
        .v-card {
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .v-card.status-man { border-left: 4px solid var(--orange); }
        .v-card.status-off { 
            border-left: 4px solid var(--red); 
            background: rgba(239, 68, 68, 0.05); 
        }

        /* --- ANIMAZIONI --- */
        .anim-box {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .fa-truck-medical { color: var(--text-main); }

        /* 1. Meccanico */
        .wrench-anim {
            position: absolute;
            color: var(--orange);
            font-size: 1.5rem;
            bottom: 5px;
            right: 0px;
            transform-origin: bottom left;
            animation: wrench-turn 0.8s ease-in-out infinite alternate;
        }

        @keyframes wrench-turn {
            0% { transform: rotate(0deg) translateY(0); }
            100% { transform: rotate(-40deg) translateY(-5px); }
        }

        /* 2. Semaforo / Lampeggiante */
        .alert-beacon {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background-color: var(--red);
            border-radius: 50%;
            border: 2px solid #000;
            box-shadow: 0 0 10px var(--red);
            animation: pulse-red 1s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(239, 68, 68, 0.6); opacity: 0.8; }
            50% { transform: scale(1.3); box-shadow: 0 0 20px rgba(239, 68, 68, 1); opacity: 1; }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(239, 68, 68, 0.6); opacity: 0.8; }
        }

        /* Info Mezzo */
        .v-info { display: flex; flex-direction: column; gap: 4px; }
        .v-sigla { font-size: 1.6rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .v-modello { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;}
        .v-targa { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.9rem; 
            font-weight: 700;
            color: var(--text-dark); 
            background: var(--text-main); 
            padding: 4px 10px; 
            border-radius: var(--radius-sm); 
            width: fit-content; 
            margin-top: 6px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-style: italic;
        }

        /* --- AUTO LIGHT MODE --- */
        body.light-mode {
            --bg-base: #f4f4f5;
            --card-bg: #ffffff;
            --border-color: #e4e4e7;
            --text-main: #09090b;
            --text-muted: #71717a;
            --text-dark: #fafafa;
        }
        body.light-mode .header { background: rgba(255, 255, 255, 0.95); }
        body.light-mode .v-card.status-off { background: rgba(239, 68, 68, 0.05); }
        body.light-mode .anim-box { background: rgba(0,0,0,0.05); }

    </style>
</head>
<body>

    <div class="header">
        <h1>SITUAZIONE OFFICINA</h1>
        <div id="clock">00:00</div>
    </div>

    <div class="dashboard-split">
        <!-- Colonna Manutenzione -->
        <div class="column col-manutenzione">
            <div class="col-header">In Manutenzione</div>
            <div class="vehicle-grid" id="grid-manutenzione">
                <!-- Generato da JS -->
            </div>
        </div>

        <!-- Colonna Fuori Servizio -->
        <div class="column col-fuori-servizio">
            <div class="col-header">Fuori Servizio</div>
            <div class="vehicle-grid" id="grid-fuori-servizio">
                <!-- Generato da JS -->
            </div>
        </div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMtO9pbvrr-yz1xMwquFeonWlhrwz6R_01HXu0swxX6tqrNok0Xjr6KRfIdYRnnGx8ZvjIoN_9vMQi/pub?gid=0&single=true&output=csv';

        async function update() {
            try {
                // Tema chiaro/scuro in base all'orario
                const currentHour = new Date().getHours();
                if (currentHour >= 8 && currentHour < 18) {
                    document.body.classList.add('light-mode');
                } else {
                    document.body.classList.remove('light-mode');
                }

                // Orologio
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

                // Fetch Dati
                const res = await fetch(sheetUrl + '&t=' + Date.now());
                const csv = await res.text();
                const sep = csv.includes(';') ? ';' : ',';
                const lines = csv.split(/\r?\n/).filter(l => l.trim() !== "");
                const data = lines.slice(1).map(l => l.split(sep).map(p => p.replace(/^"|"$/g, '').trim()));
                
                const gridMan = document.getElementById('grid-manutenzione');
                const gridOff = document.getElementById('grid-fuori-servizio');
                
                gridMan.innerHTML = '';
                gridOff.innerHTML = '';

                let countMan = 0;
                let countOff = 0;

                data.forEach(d => {
                    const sigla = d[1];
                    const modello = d[2] || '---';
                    const targa = d[3] || '---';
                    const status = (d[4] || "").toUpperCase();

                    if (!sigla) return;

                    // Creazione HTML per MANUTENZIONE
                    if (status.includes("MANUTENZIONE")) {
                        countMan++;
                        gridMan.innerHTML += `
                            <div class="v-card status-man">
                                <div class="anim-box">
                                    <i class="fa-solid fa-truck-medical"></i>
                                    <i class="fa-solid fa-wrench wrench-anim"></i>
                                </div>
                                <div class="v-info">
                                    <div class="v-sigla">${sigla}</div>
                                    <div class="v-modello">${modello}</div>
                                    <div class="v-targa">${targa}</div>
                                </div>
                            </div>
                        `;
                    }
                    
                    // Creazione HTML per FUORI SERVIZIO
                    if (status.includes("FUORI SERVIZIO")) {
                        countOff++;
                        gridOff.innerHTML += `
                            <div class="v-card status-off">
                                <div class="anim-box">
                                    <i class="fa-solid fa-truck-medical"></i>
                                    <div class="alert-beacon"></div>
                                </div>
                                <div class="v-info">
                                    <div class="v-sigla">${sigla}</div>
                                    <div class="v-modello">${modello}</div>
                                    <div class="v-targa">${targa}</div>
                                </div>
                            </div>
                        `;
                    }
                });

                // Gestione stati vuoti se non ci sono mezzi rotti (speriamo!)
                if (countMan === 0) gridMan.innerHTML = '<div class="empty-state"><i class="fa-solid fa-check-circle" style="font-size: 2rem; color: var(--green); margin-bottom: 10px; display:block;"></i>Nessun mezzo in manutenzione</div>';
                if (countOff === 0) gridOff.innerHTML = '<div class="empty-state"><i class="fa-solid fa-check-circle" style="font-size: 2rem; color: var(--green); margin-bottom: 10px; display:block;"></i>Tutti i mezzi sono operativi</div>';

            } catch (e) { 
                console.error("Errore aggiornamento dati:", e); 
            }
        }

        // Primo avvio e loop ogni 30 secondi
        update();
        setInterval(update, 30000); 
    </script>
</body>
</html>
